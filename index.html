<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatLogs – Sign In</title>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body>

<!-- ══════════════════ AUTH VIEW ══════════════════ -->
<div id="auth-view">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🕐 WatLogs</h1>
      <p>Workforce &amp; Time Logs</p>
    </div>
    <div class="auth-tabs" id="auth-tabs">
      <div class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</div>
    </div>
    <div id="auth-alert"></div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Login As</label>
        <select class="form-control" id="l-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="superadmin">Super Admin (Master Admin)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" id="l-user" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="l-pass" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Captcha Verification</label>
        <div class="captcha-wrap">
          <canvas id="captcha-canvas" width="200" height="54" title="Captcha image"></canvas>
          <button type="button" class="btn btn-outline btn-sm captcha-refresh" onclick="refreshCaptcha()" title="Refresh captcha" aria-label="Refresh captcha">&#x21bb;</button>
        </div>
        <input type="text" class="form-control" id="l-captcha" placeholder="Enter captcha text above" autocomplete="off" style="margin-top:8px" maxlength="6">
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Legal Name *</label>
        <input type="text" class="form-control" id="s-name" placeholder="Full legal name">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" class="form-control" id="s-user" placeholder="Choose username">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" class="form-control" id="s-email" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Contact Info</label>
        <input type="text" class="form-control" id="s-contact" placeholder="Phone or other contact">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" class="form-control" id="s-pass" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" class="form-control" id="s-conf" placeholder="Repeat password">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script src="js/core.js"></script>
<script src="js/user.js"></script>
<script src="js/login-history.js"></script>
<script>
'use strict';

/* ── Captcha ── */
let _captchaCode = '';

function refreshCaptcha(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  _captchaCode = code;
  const canvas = document.getElementById('captcha-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  // Background
  ctx.clearRect(0,0,W,H);
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#e0e7ff'); grad.addColorStop(1,'#f0fdf4');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  // Noise lines
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.strokeStyle=`hsl(${Math.random()*360},50%,70%)`;
    ctx.lineWidth=1.2;
    ctx.moveTo(Math.random()*W, Math.random()*H);
    ctx.lineTo(Math.random()*W, Math.random()*H);
    ctx.stroke();
  }
  // Noise dots
  for(let i=0;i<30;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsla(${Math.random()*360},40%,60%,.5)`;
    ctx.arc(Math.random()*W,Math.random()*H,1.2,0,Math.PI*2);
    ctx.fill();
  }
  // Characters
  for(let i=0;i<code.length;i++){
    ctx.save();
    ctx.font = `bold ${22+Math.floor(Math.random()*8)}px 'Segoe UI',sans-serif`;
    ctx.fillStyle = `hsl(${Math.random()*60+200},60%,35%)`;
    const x = 12 + i*29 + (Math.random()*6-3);
    const y = 30 + (Math.random()*12-6);
    ctx.translate(x,y);
    ctx.rotate((Math.random()-.5)*.5);
    ctx.fillText(code[i],0,0);
    ctx.restore();
  }
}

function showAuthAlert(msg, type='error'){
  document.getElementById('auth-alert').innerHTML=`<div class="alert alert-${type}">${U.esc(msg)}</div>`;
}

function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display=tab==='signup'?'block':'none';
  document.getElementById('auth-alert').innerHTML='';
}

async function doLogin(){
  const username=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  const role=document.getElementById('l-role').value;
  const captchaInput=document.getElementById('l-captcha').value.trim().toUpperCase();
  if(!username||!password){showAuthAlert('Please enter username and password.');return;}
  if(!captchaInput){showAuthAlert('Please enter the captcha text.');return;}
  if(captchaInput!==_captchaCode){
    showAuthAlert('Incorrect captcha. Please try again.');
    refreshCaptcha();
    document.getElementById('l-captcha').value='';
    return;
  }
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  const r=await Auth.login(username,password,role);
  btn.disabled=false; btn.innerHTML='Sign In';
  if(!r.ok){
    showAuthAlert(r.err);
    refreshCaptcha();
    document.getElementById('l-captcha').value='';
    return;
  }
  // Redirect to the appropriate role portal
  if(Auth.s.role==='superadmin') window.location.href='superadmin/';
  else if(Auth.s.role==='admin') window.location.href='admin/';
  else window.location.href='user/';
}

async function doSignup(){
  const legalName=document.getElementById('s-name').value.trim();
  const username=document.getElementById('s-user').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const contact=document.getElementById('s-contact').value.trim();
  const pass=document.getElementById('s-pass').value;
  const conf=document.getElementById('s-conf').value;
  if(!legalName||!username||!email||!pass){showAuthAlert('Please fill in all required fields (*).','error');return;}
  if(pass!==conf){showAuthAlert('Passwords do not match.','error');return;}
  if(pass.length<6){showAuthAlert('Password must be at least 6 characters.','error');return;}
  const r=await Auth.signup({legalName,username,email,contact,password:pass});
  if(!r.ok){showAuthAlert(r.err,'error');return;}
  switchTab('login');
  document.getElementById('l-user').value=username;
  showAuthAlert('Account created! Your account is pending approval by an administrator. You will be able to sign in once approved.','success');
}

async function init(){
  await bootstrap();
  // If already logged in, redirect to the appropriate portal
  const sess=Auth.restore();
  if(sess){
    if(sess.role==='superadmin') window.location.href='superadmin/';
    else if(sess.role==='admin') window.location.href='admin/';
    else window.location.href='user/';
    return;
  }
  refreshCaptcha();
  // Allow Enter key on login fields
  ['l-user','l-pass','l-captcha'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

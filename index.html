<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatLogs – Workforce &amp; Time Logs</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#4f46e5;--primary-dk:#3730a3;
      --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;
      --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
      --text:#1e293b;--muted:#64748b;
      --sidebar:#1e293b;--sidebar-txt:#cbd5e1;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Auth ── */
    #auth-view{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#667eea,#764ba2)}
    .auth-card{background:var(--surface);border-radius:16px;padding:40px;width:100%;max-width:440px;
      box-shadow:0 25px 50px rgba(0,0,0,.18)}
    .auth-logo{text-align:center;margin-bottom:28px}
    .auth-logo h1{font-size:28px;font-weight:700;color:var(--primary)}
    .auth-logo p{color:var(--muted);font-size:14px;margin-top:4px}
    .auth-tabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:22px}
    .auth-tab{flex:1;text-align:center;padding:8px;border-radius:6px;cursor:pointer;font-size:14px;
      font-weight:500;color:var(--muted);transition:all .2s}
    .auth-tab.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}

    /* ── Forms ── */
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px}
    .form-control{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;
      font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s}
    .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
    select.form-control{cursor:pointer}
    textarea.form-control{resize:vertical;min-height:80px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:540px){.grid-2{grid-template-columns:1fr}}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;
      font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-dk)}
    .btn-success{background:var(--success);color:#fff}.btn-success:hover:not(:disabled){background:#059669}
    .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover:not(:disabled){background:#dc2626}
    .btn-warning{background:var(--warning);color:#fff}.btn-warning:hover:not(:disabled){background:#d97706}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
    .btn-outline:hover:not(:disabled){background:var(--bg)}
    .btn-sm{padding:5px 11px;font-size:13px}
    .btn-full{width:100%;justify-content:center}

    /* ── Alerts ── */
    .alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
    .alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .alert-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .alert-warning{background:#fffbeb;color:#d97706;border:1px solid #fde68a}

    /* ── Dashboard layout ── */
    #dashboard-view{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--sidebar);color:var(--sidebar-txt);display:flex;
      flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
    .sidebar-header{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
    .sidebar-header h2{font-size:20px;font-weight:700;color:#fff}
    .sidebar-header p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
    .sidebar-nav{flex:1;padding:10px 8px}
    .nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;
      color:rgba(255,255,255,.35);padding:8px 8px 4px;margin-top:6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
      cursor:pointer;font-size:14px;color:var(--sidebar-txt);transition:all .2s;margin-bottom:2px}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-item.active{background:var(--primary);color:#fff}
    .sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.1)}
    .user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;
      align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0}
    .u-name{font-size:13px;font-weight:500;color:#fff}
    .u-role{font-size:11px;color:rgba(255,255,255,.45);text-transform:capitalize}
    .main-content{flex:1;margin-left:240px;padding:24px;min-height:100vh}

    /* ── Page header ── */
    .page-header{margin-bottom:22px}
    .page-header h2{font-size:22px;font-weight:700}
    .page-header p{color:var(--muted);font-size:14px;margin-top:4px}

    /* ── Cards ── */
    .card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:22px;margin-bottom:18px}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .card-header h3{font-size:15px;font-weight:600}

    /* ── Stats ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
    .stat-icon{font-size:22px;margin-bottom:10px}
    .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .stat-value{font-size:26px;font-weight:700;margin-top:3px}

    /* ── Tables ── */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 14px;background:var(--bg);color:var(--muted);
      font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
    td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafbfc}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
    .b-active{background:#dcfce7;color:#16a34a}.b-frozen{background:#dbeafe;color:#1d4ed8}
    .b-superadmin{background:#f3e8ff;color:#7c3aed}.b-admin{background:#fef3c7;color:#d97706}
    .b-user{background:#f0fdf4;color:#16a34a}
    .b-in{background:#dcfce7;color:#16a34a}.b-out{background:#f1f5f9;color:#64748b}
    .b-ok{background:#dcfce7;color:#16a34a}.b-short{background:#fef3c7;color:#d97706}
    .b-current{background:#dcfce7;color:#16a34a}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;
      align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
    .modal-box{background:var(--surface);border-radius:16px;padding:30px;max-width:460px;
      width:90%;box-shadow:0 25px 50px rgba(0,0,0,.2)}
    .modal-box h3{font-size:17px;font-weight:600;margin-bottom:8px}
    .modal-box p{color:var(--muted);font-size:14px;margin-bottom:22px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}

    /* ── Check-in status ── */
    .ci-status{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:10px;margin-bottom:18px}
    .ci-in{background:#dcfce7;border:1px solid #86efac}
    .ci-out{background:#f1f5f9;border:1px solid var(--border)}
    .ci-dot{width:10px;height:10px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite;flex-shrink:0}
    .ci-dot.off{background:var(--muted);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    #ci-timer{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--primary);text-align:right}

    /* ── JSON viewer ── */
    .tbl-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tbl-btn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:#fff;
      cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
    .tbl-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* ── Filter row ── */
    .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
    .filter-row .form-group{margin-bottom:0}

    /* ── Misc ── */
    .empty{text-align:center;padding:40px 16px;color:var(--muted)}
    .empty-icon{font-size:44px;margin-bottom:10px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.items-center{align-items:center}
    .between{justify-content:space-between}.wrap{flex-wrap:wrap}
    .mt-2{margin-top:8px}.mt-3{margin-top:12px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
    .text-sm{font-size:13px}.text-muted{color:var(--muted)}.text-danger{color:var(--danger)}
    .text-success{color:var(--success)}.fw-6{font-weight:600}
    code{font-family:monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:4px}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- ══════════════════ AUTH VIEW ══════════════════ -->
<div id="auth-view">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🕐 WatLogs</h1>
      <p>Workforce &amp; Time Logs</p>
    </div>
    <div class="auth-tabs" id="auth-tabs">
      <div class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</div>
    </div>
    <div id="auth-alert"></div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Login As</label>
        <select class="form-control" id="l-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="superadmin">Super Admin (Master Admin)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" id="l-user" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="l-pass" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Legal Name *</label>
        <input type="text" class="form-control" id="s-name" placeholder="Full legal name">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" class="form-control" id="s-user" placeholder="Choose username">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" class="form-control" id="s-email" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Contact Info</label>
        <input type="text" class="form-control" id="s-contact" placeholder="Phone or other contact">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" class="form-control" id="s-pass" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" class="form-control" id="s-conf" placeholder="Repeat password">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- ══════════════════ DASHBOARD VIEW ══════════════════ -->
<div id="dashboard-view" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>🕐 WatLogs</h2>
      <p id="sb-role-lbl">Portal</p>
    </div>
    <nav class="sidebar-nav" id="sb-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="sb-avatar">?</div>
        <div>
          <div class="u-name" id="sb-uname">—</div>
          <div class="u-role" id="sb-urole">—</div>
        </div>
      </div>
      <button class="btn btn-outline btn-full btn-sm"
        style="color:#cbd5e1;border-color:rgba(255,255,255,.2)"
        onclick="doLogout()">🚪 Sign Out</button>
    </div>
  </aside>
  <main class="main-content" id="main-content"></main>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
'use strict';

/* ════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════ */
const PFX = 'wl_';
const T = { users:'users', sessions:'sessions', hist:'login_history', ci:'checkins', lkp:'lookup' };

/* ════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════ */
const U = {
  uid: () => 'id' + Date.now() + Math.random().toString(36).slice(2,8),
  now: () => new Date().toISOString(),
  fmtDT: iso => iso ? new Date(iso).toLocaleString('en-US',{year:'numeric',month:'short',
    day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—',
  fmtD: iso => iso ? new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—',
  fmtDur: m => {
    if(m===null||m===undefined) return '—';
    return Math.floor(m/60)+'h '+(m%60)+'m';
  },
  fmtTimer: s => {
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  },
  hashPwd: p => btoa(encodeURIComponent(p+'__wl2024__')),
  checkPwd: (p,h) => U.hashPwd(p)===h,
  initials: n => {
    if(!n) return '?';
    const p=n.trim().split(/\s+/);
    return p.length>1?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();
  },
  esc: s => { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }
};

/* ════════════════════════════════════════════════════
   DATABASE  (localStorage)
════════════════════════════════════════════════════ */
const DB = {
  key: t => PFX+t,
  all: t => { try{ const r=localStorage.getItem(DB.key(t)); return t===T.lkp?(r?JSON.parse(r):{}):r?JSON.parse(r):[]; }catch{ return t===T.lkp?{}:[]; } },
  save: (t,d) => localStorage.setItem(DB.key(t),JSON.stringify(d)),
  findId: (t,id) => DB.all(t).find(r=>r.id===id)||null,
  findOne: (t,fn) => DB.all(t).find(fn)||null,
  find: (t,fn) => fn?DB.all(t).filter(fn):DB.all(t),
  insert: (t,rec) => {
    const rows=DB.all(t);
    if(!rec.id) rec.id=U.uid();
    if(!rec.createdAt) rec.createdAt=U.now();
    rows.push(rec); DB.save(t,rows); return rec;
  },
  update: (t,id,patch) => {
    const rows=DB.all(t), i=rows.findIndex(r=>r.id===id);
    if(i<0) return null;
    rows[i]={...rows[i],...patch,updatedAt:U.now()};
    DB.save(t,rows); return rows[i];
  },
  del: (t,id) => DB.save(t,DB.all(t).filter(r=>r.id!==id)),
  setLkp: patch => DB.save(T.lkp,{...DB.all(T.lkp),...patch})
};

/* ════════════════════════════════════════════════════
   IP DETECTION  (WebRTC, no external call)
════════════════════════════════════════════════════ */
const IP = {
  _v: null,
  get: () => new Promise(res => {
    if(IP._v){res(IP._v);return;}
    try{
      const pc=new RTCPeerConnection({iceServers:[]});
      pc.createDataChannel('');
      pc.createOffer().then(o=>pc.setLocalDescription(o));
      let done=false;
      pc.onicecandidate=e=>{
        if(done)return;
        if(e&&e.candidate){
          const m=e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/);
          if(m&&m[0]!=='0.0.0.0'){done=true;IP._v=m[0];try{pc.close();}catch(_){}res(m[0]);}
        }
      };
      setTimeout(()=>{if(!done){done=true;res('127.0.0.1');}},1500);
    }catch{res('127.0.0.1');}
  })
};

/* ════════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════════ */
const Auth = {
  s: null,   // current session object (with .user)

  async login(username, password, role){
    const ip = await IP.get();
    const lkp = DB.all(T.lkp);

    // IP restriction
    if(lkp.ipRestrictionEnabled && (lkp.allowedIPs||[]).length){
      const ipParts=ip.split('.');
      const ok=(lkp.allowedIPs).some(pat=>{
        const base=pat.trim().split('/')[0]; // strip CIDR notation
        const baseParts=base.split('.');
        // Each octet in the pattern must match the corresponding IP octet exactly
        return baseParts.every((part,i)=>part===ipParts[i]);
      });
      if(!ok) return {ok:false,err:`Your IP (${ip}) is not on the allowed list.`};
    }

    const user=DB.findOne(T.users,u=>u.username.toLowerCase()===username.toLowerCase());
    if(!user) return {ok:false,err:'Invalid username or password.'};
    if(!U.checkPwd(password,user.password)) return {ok:false,err:'Invalid username or password.'};
    if(user.status==='frozen') return {ok:false,err:'Account is frozen. Contact an administrator.'};
    if(role && user.role!==role)
      return {ok:false,err:`This account has role "${user.role}". Please select the correct role.`};

    // One session per user
    const existing=DB.findOne(T.sessions,s=>s.userId===user.id&&s.active);
    if(existing) return {ok:false,err:'This account already has an active session. Logout from the other device first.'};

    const sess=DB.insert(T.sessions,{userId:user.id,username:user.username,role:user.role,
      loginTime:U.now(),ipAddress:ip,active:true,logoutTime:null});
    DB.insert(T.hist,{userId:user.id,username:user.username,role:user.role,
      loginTime:U.now(),logoutTime:null,ipAddress:ip,status:'logged_in',sessionId:sess.id});
    DB.update(T.users,user.id,{lastLogin:U.now(),lastIp:ip});
    sessionStorage.setItem('wl_sid',sess.id);
    Auth.s={...sess,user};
    return {ok:true};
  },

  logout(){
    if(!Auth.s)return;
    const now=U.now(), sid=Auth.s.id, uid=Auth.s.userId;
    DB.update(T.sessions,sid,{active:false,logoutTime:now});
    const h=DB.findOne(T.hist,x=>x.sessionId===sid&&x.status==='logged_in');
    if(h) DB.update(T.hist,h.id,{logoutTime:now,status:'logged_out'});
    const ci=DB.findOne(T.ci,c=>c.userId===uid&&!c.checkoutTime);
    if(ci) DB.update(T.ci,ci.id,{checkoutTime:now,duration:Math.round((new Date()-new Date(ci.checkinTime))/60000)});
    sessionStorage.removeItem('wl_sid');
    Auth.s=null;
  },

  restore(){
    const sid=sessionStorage.getItem('wl_sid');
    if(!sid)return null;
    const sess=DB.findId(T.sessions,sid);
    if(!sess||!sess.active){sessionStorage.removeItem('wl_sid');return null;}
    const user=DB.findId(T.users,sess.userId);
    Auth.s={...sess,user};
    return Auth.s;
  },

  signup(d){
    if(DB.findOne(T.users,u=>u.username.toLowerCase()===d.username.toLowerCase()))
      return {ok:false,err:'Username already taken.'};
    if(d.email&&DB.findOne(T.users,u=>u.email.toLowerCase()===d.email.toLowerCase()))
      return {ok:false,err:'Email already registered.'};
    DB.insert(T.users,{username:d.username,password:U.hashPwd(d.password),role:'user',
      legalName:d.legalName||'',email:d.email||'',contactInfo:d.contact||'',
      status:'active',createdBy:'signup',lastLogin:null,lastIp:null});
    return {ok:true};
  }
};

/* ════════════════════════════════════════════════════
   BOOTSTRAP  – seed default data if first run
════════════════════════════════════════════════════ */
function bootstrap(){
  if(!DB.findOne(T.users,u=>u.username==='superadmin')){
    DB.insert(T.users,{id:'superadmin_root',username:'superadmin',
      password:U.hashPwd('superadmin'),role:'superadmin',legalName:'Super Administrator',
      email:'superadmin@watlogs.local',contactInfo:'',status:'active',
      createdBy:'system',lastLogin:null,lastIp:null});
  }
  const lkp=DB.all(T.lkp);
  if(!lkp.minLoginHours) DB.setLkp({minLoginHours:10,ipRestrictionEnabled:false,
    allowedIPs:[],appName:'WatLogs'});
}

}

}
function showConfirm(title,msg,onYes,danger=true){
  _confirmCb=onYes;
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <h3>${U.esc(title)}</h3>
        <p>${U.esc(msg)}</p>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn ${danger?'btn-danger':'btn-primary'}" onclick="runConfirm()">Confirm</button>
        </div>
      </div>

}
function runConfirm(){ const cb=_confirmCb; _confirmCb=null; closeModal(); if(cb) cb(); }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; _confirmCb=null; }

  _currentView=v;

   VIEW: DASHBOARD

function vDashboard(){
  const {s}=Auth, role=s.role;
  const users=DB.all(T.users), hist=DB.all(T.hist), ci=DB.all(T.ci);
  const today=new Date().toDateString();
  const myCI=ci.filter(c=>c.userId===s.userId);
  const myH=hist.filter(h=>h.userId===s.userId);
  const todayCI=myCI.find(c=>new Date(c.checkinTime).toDateString()===today);

  let statsHtml='';
  if(role==='superadmin'){
    const todayLogins=hist.filter(h=>new Date(h.loginTime).toDateString()===today).length;
    statsHtml=`<div class="stats-grid">
      ${sc('👥','Total Users',users.length,'var(--primary)')}
      ${sc('✅','Active',users.filter(u=>u.status==='active').length,'var(--success)')}
      ${sc('🔒','Frozen',users.filter(u=>u.status==='frozen').length,'var(--info)')}
      ${sc('🛡️','Admins',users.filter(u=>u.role==='admin').length,'var(--warning)')}
      ${sc('📊','Today Logins',todayLogins)}
      ${sc('📁','Total Records',hist.length+ci.length)}
    </div>`;
  } else if(role==='admin'){
    const regUsers=users.filter(u=>u.role==='user');
    statsHtml=`<div class="stats-grid">
      ${sc('👥','Total Users',regUsers.length,'var(--primary)')}
      ${sc('✅','Active',regUsers.filter(u=>u.status==='active').length,'var(--success)')}
      ${sc('🔒','Frozen',regUsers.filter(u=>u.status==='frozen').length,'var(--info)')}
      ${sc('📊','Today Logins',hist.filter(h=>new Date(h.loginTime).toDateString()===today).length)}
    </div>`;
  } else {
    const totalMins=myCI.reduce((s,c)=>s+(c.duration||0),0);
    const todayMins=todayCI?(todayCI.duration||Math.round((new Date()-new Date(todayCI.checkinTime))/60000)):0;
    statsHtml=`<div class="stats-grid">
      ${sc('🕐','Today',U.fmtDur(todayMins),'var(--primary)',true)}
      ${sc('📅','Total Logins',myH.length)}
      ${sc('⏱️','Total Hours',U.fmtDur(totalMins),'var(--success)',true)}
      ${sc('📋','CI Records',myCI.length)}
    </div>`;
  }
  const recent=(role==='user'?myH:hist).sort((a,b)=>new Date(b.loginTime)-new Date(a.loginTime)).slice(0,5);
  const rows=recent.length?recent.map(h=>{
    const dur=h.logoutTime?Math.round((new Date(h.logoutTime)-new Date(h.loginTime))/60000):null;
    return `<tr>
      ${role!=='user'?`<td><strong>${U.esc(h.username)}</strong></td>`:''}
      <td>${U.fmtDT(h.loginTime)}</td><td>${U.fmtDT(h.logoutTime)}</td>
      <td>${dur!==null?U.fmtDur(dur):'—'}</td>
      <td><code>${U.esc(h.ipAddress||'—')}</code></td>
      <td><span class="badge ${h.status==='logged_in'?'b-in':'b-out'}">${h.status==='logged_in'?'● Active':'● Ended'}</span></td>
    </tr>`;
  }).join(''):`<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">No records yet</td></tr>`;

  return `<div class="page-header">
    <h2>👋 Welcome, ${U.esc(s.user.legalName||s.username)}!</h2>
    <p>${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
       · IP: <code>${U.esc(s.ipAddress||'—')}</code></p>
  </div>
  ${statsHtml}
  <div class="card">
    <div class="card-header">
      <h3>Recent Login Activity</h3>
      <button class="btn btn-sm btn-outline" onclick="showView('${role==='user'?'my-hist':'all-hist'}')">View All →</button>
    </div>
    <div class="tbl-wrap"><table><thead><tr>
      ${role!=='user'?'<th>User</th>':''}
      <th>Login</th><th>Logout</th><th>Duration</th><th>IP</th><th>Status</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}
function sc(icon,label,val,color='var(--text)',raw=false){
  return `<div class="stat-card">
    <div class="stat-icon">${icon}</div>
    <div class="stat-label">${U.esc(label)}</div>
    <div class="stat-value" style="color:${color}">${raw?val:U.esc(String(val))}</div>
  </div>`;
}

════════════════════════════════════════════════════ */
function vCheckins(){
  const uid=Auth.s.userId;
  const active=DB.findOne(T.ci,c=>c.userId===uid&&!c.checkoutTime);
  const minH=DB.all(T.lkp).minLoginHours||10, minM=minH*60;
  const recs=DB.find(T.ci,c=>c.userId===uid).sort((a,b)=>new Date(b.checkinTime)-new Date(a.checkinTime));
  const rows=recs.length?recs.map(c=>{
    const dur=c.duration??( c.checkoutTime?Math.round((new Date(c.checkoutTime)-new Date(c.checkinTime))/60000):null );
    const isShort=dur!==null&&dur<minM, isActive=!c.checkoutTime;
    return `<tr>
      <td>${U.fmtD(c.checkinTime)}</td>
      <td>${U.fmtDT(c.checkinTime)}</td>
      <td>${c.checkoutTime?U.fmtDT(c.checkoutTime):'<span class="badge b-in">● Active</span>'}</td>
      <td>${dur!==null?U.fmtDur(dur):'—'}</td>
      <td>${isActive?'<span class="badge b-current">Active</span>':isShort?'<span class="badge b-short">Short</span>':'<span class="badge b-ok">Complete</span>'}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">No records yet</td></tr>`;

  return `<div class="page-header"><h2>⏱️ Check-In / Check-Out</h2>
    <p>Track daily attendance. Minimum session: <strong>${minH} hours</strong></p></div>
  <div class="card">
    <div class="ci-status ${active?'ci-in':'ci-out'}">
      <div class="ci-dot ${active?'':'off'}"></div>
      <div style="flex:1">
        <div style="font-weight:600">${active?'🟢 Currently Checked In':'⚪ Not Checked In'}</div>
        <div class="text-sm text-muted">${active?'Since '+U.fmtDT(active.checkinTime):'Check in to start tracking your time'}</div>
      </div>
      ${active?`<div><div id="ci-timer">00:00:00</div><div class="text-sm text-muted">elapsed</div></div>`:''}
    </div>
    ${active
      ?`<div id="ci-warn" class="alert alert-warning" style="display:none">
          ⚠️ You haven't reached the minimum ${minH}-hour threshold yet. You may still check out.
        </div>
        <button class="btn btn-danger" onclick="doCheckout()">🚪 Check Out</button>`
      :`<button class="btn btn-success" onclick="doCheckin()">✅ Check In</button>`}
  </div>
  <div class="card">
    <div class="card-header"><h3>📋 Attendance History</h3></div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>Date</th><th>Check-In</th><th>Check-Out</th><th>Duration</th><th>Status</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function startTimer(){
  const uid=Auth.s.userId;
  const active=DB.findOne(T.ci,c=>c.userId===uid&&!c.checkoutTime);
  if(!active)return;
  const minM=(DB.all(T.lkp).minLoginHours||10)*60;
  function tick(){
    const el=document.getElementById('ci-timer');
    const w=document.getElementById('ci-warn');
    if(!el){clearInterval(_timerInterval);return;}
    const elapsed=Math.floor((new Date()-new Date(active.checkinTime))/1000);
    el.textContent=U.fmtTimer(elapsed);
    if(w) w.style.display=Math.floor(elapsed/60)<minM?'flex':'none';
  }
  tick();
  _timerInterval=setInterval(tick,1000);
}

function applyHistFilter(){
  let data=DB.all(T.hist);
  const uid=document.getElementById('hf-user').value;
  const from=document.getElementById('hf-from').value;
  const to=document.getElementById('hf-to').value;
  const st=document.getElementById('hf-status').value;
  if(uid) data=data.filter(h=>h.userId===uid);
  if(from) data=data.filter(h=>new Date(h.loginTime)>=new Date(from));
  if(to) data=data.filter(h=>new Date(h.loginTime)<=new Date(to+'T23:59:59'));
  if(st) data=data.filter(h=>h.status===st);
  data.sort((a,b)=>new Date(b.loginTime)-new Date(a.loginTime));
  document.getElementById('hist-tbl').innerHTML=histTable(data);
}
function resetHistFilter(){
  ['hf-user','hf-from','hf-to','hf-status'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('hist-tbl').innerHTML=histTable(DB.all(T.hist).sort((a,b)=>new Date(b.loginTime)-new Date(a.loginTime)));
}
function viewUserHist(uid,uname){
  showView('all-hist');
  setTimeout(()=>{const s=document.getElementById('hf-user');if(s){s.value=uid;applyHistFilter();}},80);
}

/* ════════════════════════════════════════════════════
   VIEW: JSON DB VIEWER  (Super Admin)
════════════════════════════════════════════════════ */
const JSON_TABLES=[
  {k:'users',label:'👥 Users'},
  {k:'sessions',label:'🔐 Sessions'},
  {k:'login_history',label:'📜 Login History'},
  {k:'checkins',label:'⏱️ Check-ins'},
  {k:'lookup',label:'⚙️ Lookup'}
];
const TK_MAP={'users':T.users,'sessions':T.sessions,'login_history':T.hist,'checkins':T.ci,'lookup':T.lkp};

function vJsonViewer(activeK){
  activeK=activeK||'users';
  return `<div class="page-header"><h2>📁 JSON Database Viewer</h2><p>View and export all database tables</p></div>
  <div class="tbl-btns" id="jtbl-btns">
    ${JSON_TABLES.map(t=>`<button class="tbl-btn ${t.k===activeK?'active':''}" data-tk="${t.k}" onclick="switchJsonTbl('${t.k}')">${t.label}</button>`).join('')}
  </div>
  <div class="card" id="jtbl-content">${jsonTblContent(activeK)}</div>`;
}

function jsonTblContent(k){
  const tkey=TK_MAP[k]||k;
  const data=DB.all(tkey);
  const exportBtn=`<button class="btn btn-sm btn-outline" onclick="exportJson('${k}')">⬇️ Export JSON</button>`;
  if(k==='lookup'){
    const entries=Object.entries(data);
    return `<div class="card-header"><h3>⚙️ Lookup Settings</h3>${exportBtn}</div>
    <div class="tbl-wrap"><table><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>
    ${entries.length?entries.map(([key,val])=>`<tr>
      <td><strong>${U.esc(key)}</strong></td>
      <td>${U.esc(typeof val==='object'?JSON.stringify(val):String(val))}</td>
    </tr>`).join(''):'<tr><td colspan="2" style="text-align:center;padding:20px;color:var(--muted)">Empty</td></tr>'}
    </tbody></table></div>`;
  }
  if(!Array.isArray(data)||!data.length)
    return `<div class="card-header"><h3>${U.esc(k)}</h3>${exportBtn}</div>
    <div class="empty"><div class="empty-icon">📭</div><p>No records</p></div>`;
  const cols=Object.keys(data[0]);
  const rows=data.map(row=>`<tr>${cols.map(c=>{
    let v=row[c];
    if(c==='password') v='••••••••';
    else if(v===null||v===undefined) v='—';
    else if(typeof v==='boolean') v=v?'true':'false';
    else if(typeof v==='object') v=JSON.stringify(v);
    else v=String(v);
    return `<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${U.esc(v)}">${U.esc(v)}</td>`;
  }).join('')}</tr>`).join('');
  return `<div class="card-header"><h3>${U.esc(k)} <span class="text-muted">(${data.length} records)</span></h3>${exportBtn}</div>
  <div class="tbl-wrap"><table><thead><tr>${cols.map(c=>`<th>${U.esc(c)}</th>`).join('')}</tr></thead>
  <tbody>${rows}</tbody></table></div>`;
}

function switchJsonTbl(k){
  document.querySelectorAll('.tbl-btn').forEach(b=>b.classList.toggle('active',b.dataset.tk===k));
  document.getElementById('jtbl-content').innerHTML=jsonTblContent(k);
}

function exportJson(k){
  const tkey=TK_MAP[k]||k;
  let data=DB.all(tkey);
  if(Array.isArray(data)) data=data.map(r=>{const c={...r};if(c.password)c.password='**REDACTED**';return c;});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=k+'.json';a.click();URL.revokeObjectURL(url);
}

/* ════════════════════════════════════════════════════
   ACTION HANDLERS
════════════════════════════════════════════════════ */
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display=tab==='signup'?'block':'none';
  document.getElementById('auth-alert').innerHTML='';
}

async function doLogin(){
  const username=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  const role=document.getElementById('l-role').value;
  if(!username||!password){showAuthAlert('Please enter username and password.');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  const r=await Auth.login(username,password,role);
  btn.disabled=false; btn.innerHTML='Sign In';
  if(!r.ok){showAuthAlert(r.err);return;}
  loadApp();
}

function doSignup(){
  const legalName=document.getElementById('s-name').value.trim();
  const username=document.getElementById('s-user').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const contact=document.getElementById('s-contact').value.trim();
  const pass=document.getElementById('s-pass').value;
  const conf=document.getElementById('s-conf').value;
  if(!legalName||!username||!email||!pass){showAuthAlert('Please fill in all required fields (*).','error');return;}
  if(pass!==conf){showAuthAlert('Passwords do not match.','error');return;}
  if(pass.length<6){showAuthAlert('Password must be at least 6 characters.','error');return;}
  const r=Auth.signup({legalName,username,email,contact,password:pass});
  if(!r.ok){showAuthAlert(r.err,'error');return;}
  switchTab('login');
  document.getElementById('l-user').value=username;
  showAuthAlert('Account created successfully! You can now sign in.','success');
}

function doLogout(){
  showConfirm('Sign Out','Are you sure you want to sign out?',()=>{
    if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
    Auth.logout();
    document.getElementById('dashboard-view').style.display='none';
    document.getElementById('auth-view').style.display='flex';
    document.getElementById('auth-alert').innerHTML='';
    document.getElementById('l-user').value='';
    document.getElementById('l-pass').value='';
  });
}

function saveProfile(){
  const name=document.getElementById('p-name').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const contact=document.getElementById('p-contact').value.trim();
  if(!name){showAlert('prof-alert','Legal name cannot be empty.');return;}
  if(email&&email!==Auth.s.user.email){
    const dup=DB.findOne(T.users,u=>u.email.toLowerCase()===email.toLowerCase()&&u.id!==Auth.s.userId);
    if(dup){showAlert('prof-alert','Email already used by another account.');return;}
  }
  DB.update(T.users,Auth.s.userId,{legalName:name,email,contactInfo:contact});
  Auth.s.user=DB.findId(T.users,Auth.s.userId);
  document.getElementById('sb-uname').textContent=name||Auth.s.username;
  document.getElementById('sb-avatar').textContent=U.initials(name||Auth.s.username);
  showAlert('prof-alert','Profile updated successfully!','success');
}

function changePassword(){
  const cur=document.getElementById('p-cpwd').value;
  const np=document.getElementById('p-npwd').value;
  const rp=document.getElementById('p-rpwd').value;
  if(!cur||!np||!rp){showAlert('prof-alert','Fill in all password fields.');return;}
  if(!U.checkPwd(cur,Auth.s.user.password)){showAlert('prof-alert','Current password is incorrect.');return;}
  if(np.length<6){showAlert('prof-alert','New password must be at least 6 characters.');return;}
  if(np!==rp){showAlert('prof-alert','New passwords do not match.');return;}
  DB.update(T.users,Auth.s.userId,{password:U.hashPwd(np)});
  Auth.s.user=DB.findId(T.users,Auth.s.userId);
  ['p-cpwd','p-npwd','p-rpwd'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showAlert('prof-alert','Password updated successfully!','success');
}

function doCheckin(){
  const exists=DB.findOne(T.ci,c=>c.userId===Auth.s.userId&&!c.checkoutTime);
  if(exists){alert('You are already checked in.');return;}
  DB.insert(T.ci,{userId:Auth.s.userId,username:Auth.s.username,checkinTime:U.now(),checkoutTime:null,duration:null});
  showView('checkins');
}

function doCheckout(){
  const act=DB.findOne(T.ci,c=>c.userId===Auth.s.userId&&!c.checkoutTime);
  if(!act){alert('You are not checked in.');return;}
  const mins=Math.round((new Date()-new Date(act.checkinTime))/60000);
  const minM=(DB.all(T.lkp).minLoginHours||10)*60;
  const msg=mins<minM
    ?`You've been checked in for ${U.fmtDur(mins)} (minimum: ${U.fmtDur(minM)}). Check out anyway?`
    :`Check out after ${U.fmtDur(mins)}?`;
  showConfirm('Check Out',msg,()=>{
    if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
    DB.update(T.ci,act.id,{checkoutTime:U.now(),duration:mins});
    showView('checkins');
  },mins<minM);
}

function toggleUser(uid,action,uname){
  const title=action==='freeze'?'🔒 Freeze Account':'✅ Activate Account';
  const msg=action==='freeze'
    ?`Freeze account of "${uname}"? They will not be able to login.`
    :`Activate account of "${uname}"?`;
  showConfirm(title,msg,()=>{
    const st=action==='freeze'?'frozen':'active';
    DB.update(T.users,uid,{status:st});
    if(action==='freeze'){
      const sess=DB.findOne(T.sessions,s=>s.userId===uid&&s.active);
      if(sess) DB.update(T.sessions,sess.id,{active:false,logoutTime:U.now()});
    }
    showView(_currentView);
    const alertId=_currentView==='users'?'users-alert':_currentView==='create-admin'?'adm-alert':null;
    if(alertId) showAlert(alertId,`User "${uname}" has been ${st}.`,'success');
  },action==='freeze');
}

function doBulkImport(){
  const csv=document.getElementById('bulk-csv').value.trim();
  if(!csv){showAlert('bulk-alert','Please enter CSV data.');return;}
  const lines=csv.split('\n').map(l=>l.trim()).filter(Boolean);
  let start=0;
  if(lines[0].toLowerCase().startsWith('legal')) start=1;
  let ok=0; const errs=[];
  for(let i=start;i<lines.length;i++){
    const p=lines[i].split(',').map(x=>x.trim());
    if(p.length<5){errs.push(`Line ${i+1}: Need 5 fields (LegalName,Username,Email,ContactInfo,Password)`);continue;}
    const [legalName,username,email,contactInfo,password]=p;
    if(!username||!password){errs.push(`Line ${i+1}: Username and password required`);continue;}
    if(DB.findOne(T.users,u=>u.username.toLowerCase()===username.toLowerCase())){errs.push(`Line ${i+1}: Username "${username}" already exists`);continue;}
    DB.insert(T.users,{username,password:U.hashPwd(password),role:'user',
      legalName,email,contactInfo,status:'active',createdBy:Auth.s.username,lastLogin:null,lastIp:null});
    ok++;
  }
  let html='';
  if(ok) html+=`<div class="alert alert-success">✅ Imported ${ok} user(s) successfully.</div>`;
  if(errs.length) html+=`<div class="alert alert-error"><div><strong>⚠️ ${errs.length} error(s):</strong>
    <ul style="margin-top:6px;padding-left:18px">${errs.map(e=>`<li>${U.esc(e)}</li>`).join('')}</ul></div></div>`;
  document.getElementById('bulk-result').innerHTML=html;
}

function downloadTemplate(){
  const csv='LegalName,Username,Email,ContactInfo,Password\nJohn Doe,johndoe,john@example.com,555-1234,TempPass123\nJane Smith,janesmith,jane@example.com,555-5678,TempPass456';
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='bulk_import_template.csv';a.click();URL.revokeObjectURL(url);
}

function doCreateAdmin(){
  const name=document.getElementById('na-name').value.trim();
  const user=document.getElementById('na-user').value.trim();
  const email=document.getElementById('na-email').value.trim();
  const contact=document.getElementById('na-contact').value.trim();
  const pass=document.getElementById('na-pass').value;
  const conf=document.getElementById('na-conf').value;
  if(!name||!user||!email||!pass){showAlert('adm-alert','Fill in all required fields.');return;}
  if(pass!==conf){showAlert('adm-alert','Passwords do not match.');return;}
  if(DB.findOne(T.users,u=>u.username.toLowerCase()===user.toLowerCase())){showAlert('adm-alert','Username already taken.');return;}
  if(email&&DB.findOne(T.users,u=>u.email.toLowerCase()===email.toLowerCase())){showAlert('adm-alert','Email already registered.');return;}
  DB.insert(T.users,{username:user,password:U.hashPwd(pass),role:'admin',
    legalName:name,email,contactInfo:contact,status:'active',createdBy:Auth.s.username,lastLogin:null,lastIp:null});
  showAlert('adm-alert',`Admin "${user}" created successfully!`,'success');
  ['na-name','na-user','na-email','na-contact','na-pass','na-conf'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showView('create-admin');
}

function saveLookup(){
  const enabled=document.getElementById('ip-ena').checked;
  const rawIPs=document.getElementById('ip-list').value;
  const allowedIPs=rawIPs.split('\n').map(s=>s.trim()).filter(Boolean);
  const minH=parseInt(document.getElementById('min-h').value,10)||10;
  const appName=document.getElementById('app-name').value.trim()||'WatLogs';
  DB.setLkp({ipRestrictionEnabled:enabled,allowedIPs,minLoginHours:minH,appName});
  showAlert('lkp-alert','Settings saved successfully!','success');
  showView('lookup');
}

/* ════════════════════════════════════════════════════
   APP INIT
════════════════════════════════════════════════════ */
function loadApp(){
  document.getElementById('auth-view').style.display='none';
  document.getElementById('dashboard-view').style.display='flex';
  buildSidebar();
  showView('dashboard');
}

function init(){
  bootstrap();
  if(Auth.restore()){
    loadApp();
  } else {
    document.getElementById('auth-view').style.display='flex';
    document.getElementById('dashboard-view').style.display='none';
  }
  // Allow Enter key on login form
  ['l-user','l-pass'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
